<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="180" height="180" rx="40" fill="url(#shine)"/>

  <!-- Keyboard body -->
  <rect x="22" y="54" width="136" height="72" rx="12"
    stroke="white" stroke-width="7"
    fill="white" fill-opacity="0.1"/>

  <!-- Row 1: 5 keys -->
  <rect x="34"  y="66" width="18" height="14" rx="4" fill="white" fill-opacity="0.92"/>
  <rect x="58"  y="66" width="18" height="14" rx="4" fill="white" fill-opacity="0.92"/>
  <rect x="82"  y="66" width="18" height="14" rx="4" fill="white" fill-opacity="0.92"/>
  <rect x="106" y="66" width="18" height="14" rx="4" fill="white" fill-opacity="0.92"/>
  <rect x="128" y="66" width="18" height="14" rx="4" fill="white" fill-opacity="0.92"/>

  <!-- Row 2: 4 keys (offset) -->
  <rect x="44"  y="86" width="18" height="14" rx="4" fill="white" fill-opacity="0.62"/>
  <rect x="70"  y="86" width="18" height="14" rx="4" fill="white" fill-opacity="0.62"/>
  <rect x="96"  y="86" width="18" height="14" rx="4" fill="white" fill-opacity="0.62"/>
  <rect x="120" y="86" width="18" height="14" rx="4" fill="white" fill-opacity="0.62"/>

  <!-- Spacebar -->
  <rect x="58" y="106" width="64" height="14" rx="4" fill="white" fill-opacity="0.38"/>
</svg>
